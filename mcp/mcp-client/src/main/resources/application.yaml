server:
  port: 8066

spring:
  application:
    name: MCP_Client
  ai:
    openai:
      api-key: @dashscope.api.key@
      base-url: https://dashscope.aliyuncs.com/compatible-mode/
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
          maxTokens: 5000
    mcp:
      client:
        enabled: true
        name: my-mcp-client
        version: 1.0.0
        request-timeout: 60s
        type: SYNC
        stdio:
          connections:
            weather-stdio:
              command: java
              args:
                - -jar
                - "E:\\filePackage\\workspace\\LLMentorLearn\\mcp\\mcp-server-stdio\\target\\mcp-server-stdio-1.0-SNAPSHOT.jar"
#          servers-configuration: classpath:/mcp-servers.json

        sse:
          connections:
            weather-sse:
              url: http://127.0.0.1:8084
              sse-endpoint: /sse
        streamable-http:
          connections:
            weather-streamable:
              url: http://127.0.0.1:8085/stream/weather/
              endpoint: api/mcp